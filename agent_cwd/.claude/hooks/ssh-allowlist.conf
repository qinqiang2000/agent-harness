# SSH 命令白名单
# 每行一个正则表达式，匹配远程命令则放行
# 修改此文件即可，无需重启服务，无需动目标服务器
#
# 维护说明：
#   - 这是唯一需要维护的白名单文件
#   - SKILL.md 里的 ssh-commands.md 定义了"要采集什么"
#   - 本文件定义了"允许执行什么"
#   - 两者保持一致即可

# === 系统状态 ===
^top -bn
^top -H
^uptime
^nproc
^uname
^hostname
^w$
^who$
^printf 

# === CPU/进程 ===
^ps aux
^ps -T -p
^mpstat
^pidstat
^sar

# === 内存 ===
^free
^cat /proc/meminfo
^slabtop -o
^swapon

# === 磁盘 ===
^df
^du -sh
^iostat
^lsof
^find .* -type f

# === 网络 ===
^netstat
^ss -
^cat /proc/net

# === 日志/文件查看 ===
^cat 
^head 
^tail 
^less 
^grep 
^awk 
^wc 
^sort 
^ls

# === Docker ===
^docker (ps|stats|logs|inspect|top)
^docker system df
^crictl (ps|stats|logs)
# 容器内只读诊断（CPU 排查链路：进容器跑 top/jstack/jstat/jcmd/py-spy）
^docker exec [^ ]+ (top|ps|jstack|jstat|jcmd|jmap|py-spy|cat|ls|free|df)
^docker exec [^ ]+ sh -c "(jstack|jcmd|jstat|jmap|py-spy|ps|top|cat|ls)

# === Kubernetes ===
^kubectl (get|describe|logs|top)

# === Java 诊断 ===
^jstack 
^jstat 
^jcmd .* GC\.heap_info
^jcmd .* VM\.flags
^jcmd .* Thread\.print
^jmap -heap

# === Python 诊断 ===
^py-spy dump
^py-spy top -d

# === Git（只读） ===
^git (log|diff|show|clone|pull|-C .* (log|diff|show|pull))

# === 系统日志 ===
^dmesg
^journalctl .* --no-pager

# === PostgreSQL 只读诊断 ===
^psql -U postgres
^sudo -u postgres psql

# === 其他只读 ===
^vmstat
^date
^id$
^env$
