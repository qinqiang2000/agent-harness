version: "3.8"

services:
  agent:
    build: .
    container_name: agent-harness
    ports:
      - "${PORT:-9123}:9123"
    volumes:
      # SSH 密钥挂载（宿主机路径按实际情况改）
      - ./ssh-keys:/opt/agent-harness/agent_cwd/ssh-keys:ro
      # .env 文件
      - ./.env:/opt/agent-harness/.env:ro
      # 数据持久化（诊断案例等）
      - ./agent_cwd/data:/opt/agent-harness/agent_cwd/data
    env_file:
      - .env
    restart: unless-stopped
